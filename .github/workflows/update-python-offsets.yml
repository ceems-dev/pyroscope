name: Update Python Offsets

on:
  schedule:
    - cron: "5 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  update-python-offsets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: 'false'
          ref: ebpf/python-offsets
          submodules: recursive

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Check and build Python libraries
        working-directory: ebpf/testdata
        run: ./build_python.sh -i

      - name: Check and build MUSL libraries
        working-directory: ebpf/testdata
        run: ./build_musl.sh

      - name: Check and build glibc libraries
        working-directory: ebpf/testdata
        run: ./build_glibc.sh -a amd64

      - name: Update offsets
        working-directory: ebpf/testdata
        run: |
          make python/dwarfdump
          make glibc/dwarfdump
          make musl/dwarfdump

      - name: Verify Changed files
        id: verify-changed-files
        run: |
          git status
          # If there are no changes exit code will be 0 and 1 if there are changes
          if git diff --exit-code ebpf/python/glibc*.go ebpf/python/musl*.go ebpf/python/python*.go > /dev/null; then
              echo "files_changed=false" >> $GITHUB_OUTPUT
          else
              echo "files_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        run: |
          git config --local user.email "bot@ceems.com"
          git config --local user.name "CEEMS Bot"
          git add ebpf/python/glibc*.go ebpf/python/musl*.go ebpf/python/python*.go ebpf/testdata/*
          git commit -m "chore: Update Python offsets" -s

      - name: Push changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ebpf/python-offsets
          push_to_submodules: on-demand
